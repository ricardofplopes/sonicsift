  <rect x="14" y="12" width="5" height="26" rx="2.5" fill="url(#bar-grad)" opacity="0.88"/>
  <rect x="22" y="6"  width="5" height="32" rx="2.5" fill="url(#bar-grad)"/>
  <rect x="30" y="14" width="5" height="24" rx="2.5" fill="url(#bar-grad)" opacity="0.88"/>
  <rect x="38" y="20" width="5" height="18" rx="2.5" fill="url(#bar-grad)" opacity="0.75"/>
  <!-- Sieve/filter arc at the bottom -->
  <path d="M4 40 Q24 46 45 40" stroke="#6690ff" stroke-width="2" stroke-linecap="round" fill="none" opacity="0.5"/>
